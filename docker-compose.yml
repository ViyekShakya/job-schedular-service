version: "3.8"

services:
  postgres:
    image: postgres
    container_name: my-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis
    container_name: my-redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
